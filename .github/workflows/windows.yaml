name: CI for Windows
# https://github.com/google/mozc/blob/master/docs/build_mozc_in_windows.md

# Run on push.
on: push

permissions: read-all

# Prevent previous workflows from running.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up pip
        shell: cmd
        working-directory: .\src
        run: |
          python -m pip install six requests

      - name: Try to restore update_deps cache
        uses: actions/cache@v4
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Biuld Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: gyp
        shell: cmd
        working-directory: .\src
        run: |
          python build_mozc.py gyp

      - name: build package
        shell: cmd
        working-directory: .\src
        run: |
          python build_mozc.py build -c Release package

      - name: upload Mozc64.msi
        uses: actions/upload-artifact@v4
        with:
          name: Mozc64.msi
          path: src/out_win/Release/Mozc64.msi
          if-no-files-found: warn

  experimental_bazel_build:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up pip
        shell: cmd
        working-directory: .\src
        run: |
          python -m pip install six requests

      - name: Try to restore update_deps cache
        uses: actions/cache@v4
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Biuld Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: build executables for x64 env
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          mkdir out_win_x64
          bazel --bazelrc=windows.bazelrc build //win32/installer:core_dynamic_crt_artifacts --config oss_windows --verbose_failures --cpu=x64_windows --noincompatible_enable_cc_toolchain_resolution
          cp bazel-bin/gui/tool/mozc_tool.exe out_win_x64/mozc_tool.exe
          cp bazel-bin/renderer/win32/win32_renderer_main.exe out_win_x64/mozc_renderer.exe
          cp bazel-bin/server/mozc_server.exe out_win_x64/mozc_server.exe
          cp bazel-bin/win32/broker/mozc_broker_main out_win_x64/mozc_broker.exe
          cp bazel-bin/win32/cache_service/mozc_cache_service.exe out_win_x64/mozc_cache_service.exe
          bazel --bazelrc=windows.bazelrc build //win32/custom_action:custom_action --config oss_windows --verbose_failures --features=static_link_msvcrt --cpu=x64_windows --noincompatible_enable_cc_toolchain_resolution
          cp bazel-bin/win32/custom_action/custom_action.dll out_win_x64/custom_action.dll
          bazel --bazelrc=windows.bazelrc build //win32/tip:mozc_tip --config oss_windows --verbose_failures --features=static_link_msvcrt --cpu=x64_windows --noincompatible_enable_cc_toolchain_resolution
          cp bazel-bin/win32/tip/mozc_tip.dll out_win_x64/mozc_tip64.dll
          bazel --bazelrc=windows.bazelrc build //win32/tip:mozc_tip --config oss_windows --verbose_failures --features=static_link_msvcrt --cpu=x64_x86_windows --noincompatible_enable_cc_toolchain_resolution
          cp bazel-bin/win32/tip/mozc_tip.dll out_win_x64/mozc_tip32.dll

  test:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up pip
        shell: cmd
        working-directory: .\src
        run: |
          python -m pip install six requests

      - name: Try to restore update_deps cache
        uses: actions/cache@v4
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: gyp
        shell: cmd
        working-directory: .\src
        run: |
          python build_mozc.py gyp --noqt --msvs_version=2022

      - name: runtests
        shell: cmd
        working-directory: .\src
        run: |
          python build_mozc.py runtests -c Debug

  # actions/cache works without this job, but having this would increase the likelihood of cache hit
  # in other jobs. Another approach would be to use "needs:".
  # https://docs.github.com/en/actions/using-jobs/using-jobs-in-a-workflow
  cache_deps:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pip
        shell: cmd
        working-directory: .\src
        run: |
          python -m pip install requests

      - name: Try to restore update_deps cache
        uses: actions/cache@v4
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py --cache_only
